<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 360px;
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 16px;
      background: #f0f2f5;
    }
    h2 { margin: 0 0 12px; color: #1877f2; font-size: 16px; }
    button {
      width: 100%;
      padding: 10px;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #166fe5; }
    button:disabled { background: #9cb8f0; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 13px; color: #555; min-height: 20px; }
    #result { margin-top: 10px; max-height: 300px; overflow-y: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    th { background: #1877f2; color: white; padding: 8px; text-align: left; }
    td { padding: 7px 8px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    .success { color: #2e7d32; font-weight: bold; }
    .error { color: #c62828; }
    label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      padding: 7px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 12px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h2>🛒 代購 +1 統計工具</h2>

  <label>Vercel API 網址：</label>
  <input type="text" id="apiUrl" placeholder="https://你的專案.vercel.app/api/save-post" />

  <button id="scrapeBtn">📋 抓取此頁貼文與留言</button>
  <div id="status">請先開啟 Facebook 貼文頁面</div>
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
